<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competition Math Reference</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <button class="brand" id="brand-home" title="Back to the start">
        <span class="brand-sigma">&Sigma;</span>
        <div class="brand-text">
          <h1>Competition Math Reference</h1>
          <p>MATHCOUNTS &middot; AMC 10/12 &middot; AIME &middot; Olympiad</p>
        </div>
      </button>
      <div class="search-wrap">
        <input id="search-input" type="search" placeholder="Search formulas&hellip; (try &quot;cyclic&quot;, &quot;mod&quot;, &quot;expected value&quot;)" autocomplete="off">
        <kbd class="search-kbd">/</kbd>
      </div>
      <div class="topbar-tools">
        <button class="tool-btn" id="random-btn" title="Jump to a random formula">&#8646; Random</button>
      </div>
      <div class="filters-row">
        <div class="level-filters" id="level-filters"></div>
        <div class="sort-wrap">
          <label for="sort-select">Show</label>
          <select id="sort-select">
            <option value="default">Curated (all)</option>
            <option value="high">High importance</option>
            <option value="medium">Medium importance</option>
            <option value="low">Low importance</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content" id="content"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="js/data/geometry.js"></script>
  <script src="js/data/algebra.js"></script>
  <script src="js/data/number-theory.js"></script>
  <script src="js/data/counting.js"></script>
  <script src="js/data/details/geometry-details.js"></script>
  <script src="js/data/details/algebra-details.js"></script>
  <script src="js/data/details/number-theory-details.js"></script>
  <script src="js/data/details/counting-details.js"></script>
  <script src="js/data/examples-supplement.js"></script>
  <script src="js/data/problems/geometry-problems.js"></script>
  <script src="js/data/problems/contest-problems.js"></script>
  <script src="js/data/diagrams/geometry-diagrams.js"></script>
  <script src="js/data/diagrams/general-diagrams.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
